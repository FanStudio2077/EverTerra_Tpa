# EverTerra-TPA English Language File

prefix: "&8[&bTPA&8] &r"

tpa:
  sent: "&aTeleport request sent to &e{player}"
  sent_here: "&aTeleport-here request sent to &e{player}"
  received: "&e{player} &awants to teleport to you"
  received_here: "&e{player} &ainvites you to teleport to them"
  accepted: "&aRequest accepted!"
  accepted_sender: "&e{player} &aaccepted your teleport request"
  denied: "&cRequest denied"
  denied_sender: "&e{player} &cdenied your teleport request"
  cancelled: "&cYou cancelled the teleport request"
  cancelled_sender: "&e{player} &ccancelled the teleport request"
  expired: "&eTeleport request expired"
  teleporting: "&aTeleporting... &7{time}s"
  teleported: "&aTeleported!"
  teleport_cancelled: "&cTeleport cancelled"
  no_request: "&cYou have no pending teleport requests"
  self_tpa: "&cYou cannot send a TPA request to yourself"

# Chat messages for tpaccept
accept_sender: "&e{target} &aaccepted &e{player}'s &ateleport request"

error:
  player_not_found: "&cPlayer not found or offline"
  cooldown: "&cCooldown active. Please wait &e{time} &cseconds"
  no_money: "&cNot enough money! Need &e{cost} &cbut you have &e{balance}"
  cost: "&7Teleport cost: &e{cost} &7coins"
  no_permission: "&cYou do not have permission"
  already_has_request: "&cYou already have a pending teleport request"
  target_has_request: "&cThat player already has a pending teleport request"
  cancelled_move: "&cTeleport cancelled — you moved"
  cancelled_damage: "&cTeleport cancelled — you took damage"
  cancelled_death: "&cTeleport cancelled — player died"
  cancelled_quit: "&cTeleport cancelled — player went offline"
  cancelled_world: "&cTeleport cancelled — world changed"
  rate_limit: "&cToo many requests. Please wait a moment"

